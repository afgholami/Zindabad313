name: Auto-deploy on Infomaniak

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Action à exécuter"
        required: true
        default: "build"
        type: choice
        options:
          - discover
          - build
          - restart

permissions:
  contents: read

env:
  INFOMANIAK_API_BASE: https://api.infomaniak.com

jobs:
  deploy:
    name: Trigger Infomaniak build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Vérifier le token Personal Access
        run: |
          if [ -z "${{ secrets.INFOMANIAK_API_TOKEN }}" ]; then
            echo "::error::Secret INFOMANIAK_API_TOKEN manquant."
            echo "::error::Génère un Personal Access Token sur https://manager.infomaniak.com/v3/infomaniak-api"
            exit 1
          fi
          echo "✅ Token présent"

      - name: Discover — liste les produits/sites Infomaniak
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'discover'
        env:
          TOKEN: ${{ secrets.INFOMANIAK_API_TOKEN }}
        run: |
          set -euo pipefail
          echo "=== /1/profile (test auth) ==="
          curl -s -H "Authorization: Bearer $TOKEN" \
            "$INFOMANIAK_API_BASE/1/profile" | jq '.' || true

          echo ""
          echo "=== /1/product ==="
          curl -s -H "Authorization: Bearer $TOKEN" \
            "$INFOMANIAK_API_BASE/1/product" | jq '.' || true

          echo ""
          echo "=== /1/product?service_name=hosting ==="
          curl -s -H "Authorization: Bearer $TOKEN" \
            "$INFOMANIAK_API_BASE/1/product?service_name=hosting" | jq '.' || true

          if [ -n "${{ secrets.INFOMANIAK_HOSTING_ID }}" ]; then
            echo ""
            echo "=== /1/hosting/${{ secrets.INFOMANIAK_HOSTING_ID }} ==="
            curl -s -H "Authorization: Bearer $TOKEN" \
              "$INFOMANIAK_API_BASE/1/hosting/${{ secrets.INFOMANIAK_HOSTING_ID }}" | jq '.' || true

            echo ""
            echo "=== /1/hosting/${{ secrets.INFOMANIAK_HOSTING_ID }}/site ==="
            curl -s -H "Authorization: Bearer $TOKEN" \
              "$INFOMANIAK_API_BASE/1/hosting/${{ secrets.INFOMANIAK_HOSTING_ID }}/site" | jq '.' || true
          fi

      - name: Trigger build de l'application
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'build')
        env:
          TOKEN: ${{ secrets.INFOMANIAK_API_TOKEN }}
          HOSTING_ID: ${{ secrets.INFOMANIAK_HOSTING_ID }}
          SITE_ID: ${{ secrets.INFOMANIAK_SITE_ID }}
        run: |
          set -euo pipefail
          if [ -z "$HOSTING_ID" ] || [ -z "$SITE_ID" ]; then
            echo "::error::Secrets INFOMANIAK_HOSTING_ID et INFOMANIAK_SITE_ID requis."
            echo "::error::Lance d'abord le workflow en mode 'discover' pour les trouver."
            exit 1
          fi

          ENDPOINTS=(
            "$INFOMANIAK_API_BASE/1/hosting/$HOSTING_ID/site/$SITE_ID/application/build"
            "$INFOMANIAK_API_BASE/1/hosting/$HOSTING_ID/site/$SITE_ID/node/build"
            "$INFOMANIAK_API_BASE/1/hosting/$HOSTING_ID/site/$SITE_ID/build"
          )

          for ENDPOINT in "${ENDPOINTS[@]}"; do
            echo "🔨 POST $ENDPOINT"
            RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"remove_node_modules": false}' \
              "$ENDPOINT")

            BODY=$(echo "$RESPONSE" | sed '$d')
            STATUS=$(echo "$RESPONSE" | tail -n1 | cut -d: -f2)
            echo "Status: $STATUS"
            echo "Body: $BODY"

            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
              echo "✅ Build déclenché avec succès via $ENDPOINT"
              exit 0
            fi
            echo ""
          done

          echo "::error::Aucun endpoint connu n'a marché. Lance le workflow en mode 'discover' et inspecte la réponse."
          exit 1

      - name: Restart de l'application
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'restart'
        env:
          TOKEN: ${{ secrets.INFOMANIAK_API_TOKEN }}
          HOSTING_ID: ${{ secrets.INFOMANIAK_HOSTING_ID }}
          SITE_ID: ${{ secrets.INFOMANIAK_SITE_ID }}
        run: |
          set -euo pipefail
          ENDPOINT="$INFOMANIAK_API_BASE/1/hosting/$HOSTING_ID/site/$SITE_ID/application/restart"
          echo "🔄 POST $ENDPOINT"
          curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "$ENDPOINT"
