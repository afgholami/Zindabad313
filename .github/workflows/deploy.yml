name: Auto-deploy on Infomaniak

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Action à exécuter"
        required: true
        default: "build"
        type: choice
        options:
          - discover
          - build
          - restart

permissions:
  contents: read

env:
  INFOMANIAK_API_BASE: https://api.infomaniak.com

jobs:
  deploy:
    name: Trigger Infomaniak build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Obtenir un token OAuth2
        id: token
        run: |
          set -euo pipefail
          TOKEN_RESPONSE=$(curl -s -X POST "$INFOMANIAK_API_BASE/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ secrets.INFOMANIAK_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.INFOMANIAK_CLIENT_SECRET }}")

          if ! echo "$TOKEN_RESPONSE" | jq -e .access_token > /dev/null 2>&1; then
            echo "::error::Échec de l'authentification OAuth2"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r .access_token)
          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"
          echo "✅ Token OAuth2 obtenu"

      - name: Discover — liste les produits/sites Infomaniak
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'discover'
        env:
          ACCESS_TOKEN: ${{ steps.token.outputs.access_token }}
        run: |
          set -euo pipefail
          echo "=== /1/product ==="
          curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
            "$INFOMANIAK_API_BASE/1/product" | jq '.' || true

          echo ""
          echo "=== /1/hosting ==="
          curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
            "$INFOMANIAK_API_BASE/1/hosting" | jq '.' || true

          if [ -n "${{ secrets.INFOMANIAK_HOSTING_ID }}" ]; then
            echo ""
            echo "=== /1/hosting/${{ secrets.INFOMANIAK_HOSTING_ID }}/site ==="
            curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
              "$INFOMANIAK_API_BASE/1/hosting/${{ secrets.INFOMANIAK_HOSTING_ID }}/site" | jq '.' || true
          fi

      - name: Trigger build de l'application
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'build')
        env:
          ACCESS_TOKEN: ${{ steps.token.outputs.access_token }}
          HOSTING_ID: ${{ secrets.INFOMANIAK_HOSTING_ID }}
          SITE_ID: ${{ secrets.INFOMANIAK_SITE_ID }}
        run: |
          set -euo pipefail
          if [ -z "$HOSTING_ID" ] || [ -z "$SITE_ID" ]; then
            echo "::error::Secrets INFOMANIAK_HOSTING_ID et INFOMANIAK_SITE_ID requis."
            echo "::error::Lance d'abord le workflow en mode 'discover' pour les trouver."
            exit 1
          fi

          # Tentative 1 — endpoint le plus probable
          ENDPOINT="$INFOMANIAK_API_BASE/1/hosting/$HOSTING_ID/site/$SITE_ID/application/build"
          echo "🔨 POST $ENDPOINT"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"remove_node_modules": false}' \
            "$ENDPOINT")

          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1 | cut -d: -f2)
          echo "Status: $STATUS"
          echo "Body: $BODY"

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "✅ Build déclenché avec succès"
            exit 0
          fi

          echo "::warning::Endpoint principal a échoué (HTTP $STATUS). Tentative alternative..."

          # Tentative 2 — variante avec /node
          ALT_ENDPOINT="$INFOMANIAK_API_BASE/1/hosting/$HOSTING_ID/site/$SITE_ID/node/build"
          echo "🔨 POST $ALT_ENDPOINT"
          curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "$ALT_ENDPOINT"

          echo ""
          echo "::error::Aucun endpoint connu n'a marché. Lance le workflow en mode 'discover' et regarde la réponse."
          exit 1

      - name: Restart de l'application
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'restart'
        env:
          ACCESS_TOKEN: ${{ steps.token.outputs.access_token }}
          HOSTING_ID: ${{ secrets.INFOMANIAK_HOSTING_ID }}
          SITE_ID: ${{ secrets.INFOMANIAK_SITE_ID }}
        run: |
          set -euo pipefail
          ENDPOINT="$INFOMANIAK_API_BASE/1/hosting/$HOSTING_ID/site/$SITE_ID/application/restart"
          echo "🔄 POST $ENDPOINT"
          curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "$ENDPOINT"
