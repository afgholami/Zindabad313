name: Auto-deploy on Infomaniak

# Désactivé temporairement sur push : l'API publique d'Infomaniak ne semble
# pas exposer l'endpoint de build pour le produit Node.js (hosting_3).
# Voir docs/JOURNAL.md pour les détails. À reprendre :
#  - soit via SSH + commande de build
#  - soit en reverse-engineering de l'UI manager.infomaniak.com (DevTools)
#  - soit via ticket support Infomaniak pour obtenir l'endpoint officiel
on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action à exécuter"
        required: true
        default: "discover"
        type: choice
        options:
          - discover
          - build
          - restart

permissions:
  contents: read

env:
  INFOMANIAK_API_BASE: https://api.infomaniak.com

jobs:
  deploy:
    name: Trigger Infomaniak build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Vérifier le token Personal Access
        run: |
          if [ -z "${{ secrets.INFOMANIAK_API_TOKEN }}" ]; then
            echo "::error::Secret INFOMANIAK_API_TOKEN manquant."
            echo "::error::Génère un Personal Access Token sur https://manager.infomaniak.com/v3/infomaniak-api"
            exit 1
          fi
          echo "✅ Token présent"

      - name: Discover — liste les produits/sites Infomaniak
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'discover'
        env:
          TOKEN: ${{ secrets.INFOMANIAK_API_TOKEN }}
          HOSTING_ID: ${{ secrets.INFOMANIAK_HOSTING_ID }}
        run: |
          set -euo pipefail

          # Helper pour appeler l'API et logger le résultat
          probe() {
            local label="$1"
            local url="$2"
            echo ""
            echo "═══ $label"
            echo "GET $url"
            local resp
            resp=$(curl -s -w "\n__STATUS__:%{http_code}" -H "Authorization: Bearer $TOKEN" "$url")
            local status
            status=$(echo "$resp" | tail -n1 | cut -d: -f2)
            local body
            body=$(echo "$resp" | sed '$d')
            echo "Status: $status"
            echo "$body" | jq '.' 2>/dev/null || echo "$body"
          }

          probe "Test auth" "$INFOMANIAK_API_BASE/1/profile"
          probe "Tous les produits" "$INFOMANIAK_API_BASE/1/product"

          if [ -n "$HOSTING_ID" ]; then
            # Patterns possibles pour le produit Node.js (hosting_3)
            probe "v1 /hosting/$HOSTING_ID" "$INFOMANIAK_API_BASE/1/hosting/$HOSTING_ID"
            probe "v1 /hosting/$HOSTING_ID/site" "$INFOMANIAK_API_BASE/1/hosting/$HOSTING_ID/site"
            probe "v1 /hosting_3/$HOSTING_ID" "$INFOMANIAK_API_BASE/1/hosting_3/$HOSTING_ID"
            probe "v1 /hosting_3/$HOSTING_ID/site" "$INFOMANIAK_API_BASE/1/hosting_3/$HOSTING_ID/site"
            probe "v2 /hosting_3/$HOSTING_ID" "$INFOMANIAK_API_BASE/2/hosting_3/$HOSTING_ID"
            probe "v1 /product/$HOSTING_ID" "$INFOMANIAK_API_BASE/1/product/$HOSTING_ID"
            probe "v1 /product/$HOSTING_ID/site" "$INFOMANIAK_API_BASE/1/product/$HOSTING_ID/site"
            probe "v1 /cloud/$HOSTING_ID" "$INFOMANIAK_API_BASE/1/cloud/$HOSTING_ID"
            probe "v1 /cloud/$HOSTING_ID/site" "$INFOMANIAK_API_BASE/1/cloud/$HOSTING_ID/site"
            probe "v1 /site (filtré sur hosting)" "$INFOMANIAK_API_BASE/1/site?service_id=57&product_id=$HOSTING_ID"
          fi

          probe "v1 /site (tous)" "$INFOMANIAK_API_BASE/1/site"

      - name: Trigger build de l'application
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'build')
        env:
          TOKEN: ${{ secrets.INFOMANIAK_API_TOKEN }}
          HOSTING_ID: ${{ secrets.INFOMANIAK_HOSTING_ID }}
          SITE_ID: ${{ secrets.INFOMANIAK_SITE_ID }}
        run: |
          set -euo pipefail
          if [ -z "$HOSTING_ID" ] || [ -z "$SITE_ID" ]; then
            echo "::error::Secrets INFOMANIAK_HOSTING_ID et INFOMANIAK_SITE_ID requis."
            echo "::error::Lance d'abord le workflow en mode 'discover' pour les trouver."
            exit 1
          fi

          ENDPOINTS=(
            "$INFOMANIAK_API_BASE/1/hosting/$HOSTING_ID/site/$SITE_ID/application/build"
            "$INFOMANIAK_API_BASE/1/hosting/$HOSTING_ID/site/$SITE_ID/node/build"
            "$INFOMANIAK_API_BASE/1/hosting/$HOSTING_ID/site/$SITE_ID/build"
          )

          for ENDPOINT in "${ENDPOINTS[@]}"; do
            echo "🔨 POST $ENDPOINT"
            RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"remove_node_modules": false}' \
              "$ENDPOINT")

            BODY=$(echo "$RESPONSE" | sed '$d')
            STATUS=$(echo "$RESPONSE" | tail -n1 | cut -d: -f2)
            echo "Status: $STATUS"
            echo "Body: $BODY"

            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
              echo "✅ Build déclenché avec succès via $ENDPOINT"
              exit 0
            fi
            echo ""
          done

          echo "::error::Aucun endpoint connu n'a marché. Lance le workflow en mode 'discover' et inspecte la réponse."
          exit 1

      - name: Restart de l'application
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'restart'
        env:
          TOKEN: ${{ secrets.INFOMANIAK_API_TOKEN }}
          HOSTING_ID: ${{ secrets.INFOMANIAK_HOSTING_ID }}
          SITE_ID: ${{ secrets.INFOMANIAK_SITE_ID }}
        run: |
          set -euo pipefail
          ENDPOINT="$INFOMANIAK_API_BASE/1/hosting/$HOSTING_ID/site/$SITE_ID/application/restart"
          echo "🔄 POST $ENDPOINT"
          curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "$ENDPOINT"
